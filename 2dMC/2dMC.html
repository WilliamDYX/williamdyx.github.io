<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Minecraft</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #87CEEB;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #gameCanvas {
            border: 4px solid #333;
            background: #87CEEB;
            image-rendering: pixelated;
        }
        .panel {
            margin: 8px 0;
            display: flex;
            gap: 10px;
        }
        .block-btn {
            width: 50px;
            height: 50px;
            border: 3px solid #222;
            cursor: pointer;
        }
        .info {
            margin: 6px 0;
            color: #222;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="info">左键放置方块 | 右键删除方块 | A/D移动 | W跳跃 | 选择下方方块</div>
    <div class="panel">
        <button class="block-btn" style="background:#7d5a4a" data-id="dirt"></button>
        <button class="block-btn" style="background:#5a9e4b" data-id="grass"></button>
        <button class="block-btn" style="background:#888" data-id="stone"></button>
        <button class="block-btn" style="background:#6b4423" data-id="wood"></button>
    </div>
    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <script>
        // 画布基础设置
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const BLOCK_SIZE = 32;
        const GRAVITY = 0.6;
        const JUMP_POWER = -14;
        const MOVE_SPEED = 5;

        // 方块颜色配置
        const blockColors = {
            dirt: '#7d5a4a',
            grass: '#5a9e4b',
            stone: '#888888',
            wood: '#6b4423'
        };
        let selectBlock = 'grass';

        // 世界方块存储 Map {x,y: type}
        const world = new Map();
        // 玩家数据
        const player = {
            x: 100,
            y: 100,
            w: 28,
            h: 28,
            vx: 0,
            vy: 0,
            onGround: false
        };
        // 键盘按键状态
        const keys = {};

        // 初始化地面地形
        function initWorld() {
            // 底部泥土+草地地面
            for(let x = 0; x < canvas.width; x += BLOCK_SIZE) {
                world.set(`${x},${canvas.height - BLOCK_SIZE}`, 'dirt');
                world.set(`${x},${canvas.height - BLOCK_SIZE*2}`, 'grass');
            }
            // 随机石头山体
            for(let i=0;i<120;i++){
                let rx = Math.floor(Math.random() * canvas.width / BLOCK_SIZE) * BLOCK_SIZE;
                let ry = Math.floor(Math.random() * (canvas.height/2) / BLOCK_SIZE) * BLOCK_SIZE;
                world.set(`${rx},${ry}`, 'stone');
            }
        }

        // 方块选择按钮绑定
        document.querySelectorAll('.block-btn').forEach(btn=>{
            btn.onclick = ()=> selectBlock = btn.dataset.id;
        })

        // 键盘监听
        window.addEventListener('keydown', e=> keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e=> keys[e.key.toLowerCase()] = false);

        // 鼠标方块放置/删除
        canvas.addEventListener('mousedown', e=>{
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            const bx = Math.floor(mx / BLOCK_SIZE) * BLOCK_SIZE;
            const by = Math.floor(my / BLOCK_SIZE) * BLOCK_SIZE;
            const key = `${bx},${by}`;
            if(e.button === 0){ // 左键放置
                world.set(key, selectBlock);
            }else if(e.button === 2){ // 右键删除
                world.delete(key);
            }
        })
        // 屏蔽右键菜单
        canvas.addEventListener('contextmenu', e=> e.preventDefault());

        // 碰撞检测：检测坐标是否有实心方块
        function hasBlock(x, y){
            const bx = Math.floor(x / BLOCK_SIZE) * BLOCK_SIZE;
            const by = Math.floor(y / BLOCK_SIZE) * BLOCK_SIZE;
            return world.has(`${bx},${by}`);
        }

        // AABB方块碰撞检测
        function isCollide(px, py, pw, ph){
            const left = Math.floor(px / BLOCK_SIZE);
            const right = Math.floor((px + pw - 1) / BLOCK_SIZE);
            const top = Math.floor(py / BLOCK_SIZE);
            const bottom = Math.floor((py + ph - 1) / BLOCK_SIZE);
            for(let x = left; x <= right; x++){
                for(let y = top; y <= bottom; y++){
                    if(world.has(`${x*BLOCK_SIZE},${y*BLOCK_SIZE}`)) return true;
                }
            }
            return false;
        }

        // 更新玩家物理与移动
        function updatePlayer(){
            // 水平移动
            player.vx = 0;
            if(keys['a']) player.vx = -MOVE_SPEED;
            if(keys['d']) player.vx = MOVE_SPEED;

            // 水平碰撞移动
            if(!isCollide(player.x + player.vx, player.y, player.w, player.h)){
                player.x += player.vx;
            }

            // 跳跃
            if(keys['arrowup']){
                player.vy = JUMP_POWER;
                player.onGround = false;
            }

            // 重力
            player.vy += GRAVITY;
            // 垂直移动+碰撞
            if(!isCollide(player.x, player.y + player.vy, player.w, player.h)){
                player.y += player.vy;
                player.onGround = false;
            }else{
                // 落地
                if(player.vy > 0) player.onGround = true;
                player.vy = 0;
            }

            // 边界限制
            player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));
            player.y = Math.min(canvas.height - player.h, player.y);
        }

        // 渲染全部画面
        function render(){
            // 清空天空背景
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0,0,canvas.width,canvas.height);

            // 绘制所有方块
            world.forEach((type, key)=>{
                const [x,y] = key.split(',').map(Number);
                ctx.fillStyle = blockColors[type];
                ctx.fillRect(x, y, BLOCK_SIZE, BLOCK_SIZE);
                // 方块边框
                ctx.strokeStyle = '#222';
                ctx.lineWidth = 1;
                ctx.strokeRect(x, y, BLOCK_SIZE, BLOCK_SIZE);
            })

            // 绘制玩家（史蒂夫红色小人）
            ctx.fillStyle = '#ff4444';
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.strokeStyle = '#000';
            ctx.strokeRect(player.x, player.y, player.w, player.h);
        }

        // 游戏主循环
        function gameLoop(){
            updatePlayer();
            render();
            requestAnimationFrame(gameLoop);
        }

        // 启动游戏
        initWorld();
        gameLoop();
    </script>
</body>
</html>
