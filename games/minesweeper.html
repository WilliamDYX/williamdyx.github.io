<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minesweeper</title>
    <!-- 引入 Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Arial:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #D5EDFF;
            --tile-bg: #d3d3d3;
            --tile-bg-clicked: #c1c1c1;
            --border-light: #ffffff;
            --border-dark: #7b7b7b;
            --font-main: 'Arial', sans-serif; /* Fallback to Arial if Arial Black fails */
            
            /* 数字颜色 */
            --color-1: #0101FE;
            --color-2: #0A8209;
            --color-3: #e74c3c;
            --color-4: #000080;
            --color-5: #800000;
            --color-6: #008080;
            --color-7: #000000;
            --color-8: #808080;
        }

        body {
            background-color: var(--bg-color);
            font-family: var(--font-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            user-select: none; /* 防止双击选中文本 */
        }

        h1 {
            font-weight: 900;
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .bomb-icon-header {
            width: 30px;
            height: 30px;
        }

        .game-info {
            margin-bottom: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #555;
        }

        /* 游戏容器 */
        .board-container {
            position: relative;
            padding: 10px;
            background: #bdbdbd;
            border: 4px solid #7b7b7b;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .board {
            display: grid;
            /* 列数将在JS中动态设置 */
            gap: 1px; 
            background-color: #7b7b7b; /* 网格线颜色 */
        }

        /* 方块样式 */
        .tile {
            width: 30px;
            height: 30px;
            background-color: var(--tile-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            
            /* 3D 凸起效果 */
            border-top: 3px solid var(--border-light);
            border-left: 3px solid var(--border-light);
            border-right: 3px solid var(--border-dark);
            border-bottom: 3px solid var(--border-dark);
            box-sizing: border-box;
        }

        /* 鼠标悬停未点击的方块 */
        .tile:not(.revealed):hover {
            filter: brightness(1.1);
        }

        /* 已揭开的方块样式 */
        .tile.revealed {
            background-color: var(--tile-bg-clicked);
            border: 1px solid #999; /* 平坦化 */
            cursor: default;
        }

        /* 炸弹样式 */
        .tile.mine {
            background-color: #e74c3c;
            border: 1px solid #999;
        }
        
        .tile img {
            width: 70%;
            height: 70%;
            object-fit: contain;
        }

        /* 标记样式 */
        .tile.flagged {
            background-color: var(--tile-bg);
        }

        /* 数字颜色类 */
        .num-1 { color: var(--color-1); }
        .num-2 { color: var(--color-2); }
        .num-3 { color: var(--color-3); }
        .num-4 { color: var(--color-4); }
        .num-5 { color: var(--color-5); }
        .num-6 { color: var(--color-6); }
        .num-7 { color: var(--color-7); }
        .num-8 { color: var(--color-8); }

        /* 按钮样式 */
        .reset-btn {
            margin-top: 20px;
            padding: 10px 25px;
            font-size: 16px;
            font-weight: bold;
            font-family: var(--font-main);
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }

        .reset-btn:active {
            transform: scale(0.95);
        }

        /* 覆盖层 (胜利/失败) */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .overlay-msg {
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px #000;
        }

        /* 响应式调整 */
        @media (max-width: 600px) {
            .tile {
                width: 15px;
                height: 15px;
                font-size: 10px;
                border-width: 1px; /* 手机上边框细一点 */
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .bomb-icon-header {
                width: 20px;
                height: 20px;
            }
        }
    </style>
</head>
<body>

    <h1>
        Minesweeper 
        <img src="https://img.alicdn.com/imgextra/i3/O1CN01sMUftH1WAB0m3EG8W_!!6000000002747-2-tps-357-356.png" alt="Bomb" class="bomb-icon-header">
    </h1>

    <div class="game-info">
        Flags: <span id="flag-count">0</span> / <span id="total-mines">0</span>
    </div>

    <div class="board-container">
        <div id="board" class="board">
            <!-- 网格将通过 JS 动态生成 -->
        </div>
        
        <!-- 游戏结束覆盖层 -->
        <div id="overlay" class="overlay">
            <div id="overlay-msg" class="overlay-msg">Game Over</div>
            <button class="reset-btn" onclick="initGame()">Play Again</button>
        </div>
    </div>

    <button class="reset-btn" onclick="initGame()">New Game</button>

    <script>
        // --- 配置参数 ---
        const ROWS = 10;
        const COLS = 10;
        const BOMB_FREQUENCY = 0.15; // 15% 的概率是炸弹
        
        // 图标资源
        const BOMB_IMG = "https://img.alicdn.com/imgextra/i3/O1CN01sMUftH1WAB0m3EG8W_!!6000000002747-2-tps-357-356.png";
        const FLAG_IMG = "https://img.alicdn.com/imgextra/i1/O1CN011JCO9B23Ug3p5EzB8_!!6000000007259-2-tps-898-898.png";

        // --- 状态变量 ---
        let boardData = []; // 存储每个格子的数据 { isMine, neighborCount, isRevealed, isFlagged }
        let isGameOver = false;
        let flagsUsed = 0;
        let totalMines = 0;
        let revealedCount = 0;

        // DOM 元素
        const boardElement = document.getElementById('board');
        const flagCountElement = document.getElementById('flag-count');
        const totalMinesElement = document.getElementById('total-mines');
        const overlay = document.getElementById('overlay');
        const overlayMsg = document.getElementById('overlay-msg');

        // --- 初始化游戏 ---
        function initGame() {
            // 重置状态
            isGameOver = false;
            flagsUsed = 0;
            revealedCount = 0;
            boardData = [];
            overlay.classList.remove('active');
            
            // 清空并重新设置网格样式
            boardElement.innerHTML = '';
            boardElement.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;

            // 1. 生成数据结构
            generateBoardData();

            // 2. 渲染 DOM
            renderBoard();

            // 3. 更新 UI 计数
            updateFlagUI();
        }

        // 生成棋盘数据
        function generateBoardData() {
            totalMines = 0;
            
            // 初始化空数组
            for (let r = 0; r < ROWS; r++) {
                let row = [];
                for (let c = 0; c < COLS; c++) {
                    row.push({
                        r: r,
                        c: c,
                        isMine: false,
                        neighborCount: 0,
                        isRevealed: false,
                        isFlagged: false
                    });
                }
                boardData.push(row);
            }

            // 随机放置炸弹
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (Math.random() < BOMB_FREQUENCY) {
                        boardData[r][c].isMine = true;
                        totalMines++;
                    }
                }
            }

            // 计算每个格子周围的炸弹数
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (!boardData[r][c].isMine) {
                        boardData[r][c].neighborCount = countNeighbors(r, c);
                    }
                }
            }
        }

        // 计算周围炸弹数
        function countNeighbors(r, c) {
            let count = 0;
            for (let i = -1; i <= 1; i++) {
                for (let j = -1; j <= 1; j++) {
                    const nr = r + i;
                    const nc = c + j;
                    // 检查边界
                    if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                        if (boardData[nr][nc].isMine) count++;
                    }
                }
            }
            return count;
        }

        // 渲染棋盘 DOM
        function renderBoard() {
            const fragment = document.createDocumentFragment();

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const tile = document.createElement('div');
                    tile.classList.add('tile');
                    tile.dataset.tile = `${r},${c}`; // 存储坐标
                    
                    // 添加初始内容占位（可选，这里保持为空直到点击）
                    fragment.appendChild(tile);
                }
            }
            boardElement.appendChild(fragment);
        }

        // --- 事件处理 (事件委托) ---
        boardElement.addEventListener('click', (e) => {
            if (isGameOver) return;
            
            const tile = e.target.closest('.tile');
            if (!tile) return;

            const [r, c] = tile.dataset.tile.split(',').map(Number);
            handleLeftClick(r, c);
        });

        // 禁用右键默认菜单并处理标记
        boardElement.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            if (isGameOver) return;

            const tile = e.target.closest('.tile');
            if (!tile) return;

            const [r, c] = tile.dataset.tile.split(',').map(Number);
            handleRightClick(r, c);
        });

        // 左键点击逻辑
        function handleLeftClick(r, c) {
            const cell = boardData[r][c];
            
            if (cell.isRevealed || cell.isFlagged) return;

            if (cell.isMine) {
                gameOver(false);
            } else {
                revealTile(r, c);
                checkWin();
            }
        }

        // 右键点击逻辑 (标记)
        function handleRightClick(r, c) {
            const cell = boardData[r][c];
            if (cell.isRevealed) return;

            cell.isFlagged = !cell.isFlagged;
            
            // 更新 DOM
            const tile = getTileElement(r, c);
            if (cell.isFlagged) {
                tile.classList.add('flagged');
                tile.innerHTML = `<img src="${FLAG_IMG}" alt="Flag">`;
                flagsUsed++;
            } else {
                tile.classList.remove('flagged');
                tile.innerHTML = '';
                flagsUsed--;
            }
            updateFlagUI();
        }

        // 递归翻开格子
        function revealTile(r, c) {
            // 边界检查和状态检查
            if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
            const cell = boardData[r][c];
            
            if (cell.isRevealed || cell.isFlagged) return;

            // 标记为已揭开
            cell.isRevealed = true;
            revealedCount++;
            
            const tile = getTileElement(r, c);
            tile.classList.add('revealed');

            // 如果周围有炸弹，显示数字
            if (cell.neighborCount > 0) {
                tile.textContent = cell.neighborCount;
                tile.classList.add(`num-${cell.neighborCount}`);
            } else {
                // 如果是空白 (0)，递归翻开周围所有格子
                for (let i = -1; i <= 1; i++) {
                    for (let j = -1; j <= 1; j++) {
                        revealTile(r + i, c + j);
                    }
                }
            }
        }

        // 获取 DOM 元素辅助函数
        function getTileElement(r, c) {
            // 使用 querySelector 查找特定 data-tile 的元素
            return document.querySelector(`.tile[data-tile="${r},${c}"]`);
        }

        // 更新旗帜计数 UI
        function updateFlagUI() {
            flagCountElement.textContent = flagsUsed;
            totalMinesElement.textContent = totalMines;
        }

        // 检查胜利条件
        function checkWin() {
            const totalCells = ROWS * COLS;
            // 胜利条件：所有非炸弹格子都被揭开
            if (revealedCount === totalCells - totalMines) {
                gameOver(true);
            }
        }

        // 游戏结束处理
        function gameOver(isWin) {
            isGameOver = true;
            
            // 揭示所有炸弹
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cell = boardData[r][c];
                    const tile = getTileElement(r, c);
                    
                    if (cell.isMine) {
                        tile.classList.add('revealed', 'mine');
                        tile.innerHTML = `<img src="${BOMB_IMG}" alt="Bomb">`;
                    } else if (cell.isFlagged && !cell.isMine) {
                        // 标记错误的炸弹 (可选视觉反馈)
                        tile.style.backgroundColor = '#ffcccc'; 
                    }
                }
            }

            // 显示覆盖层
            setTimeout(() => {
                overlayMsg.textContent = isWin ? "You Win! 🎉" : "Game Over 💥";
                overlayMsg.style.color = isWin ? "#4CAF50" : "#e74c3c";
                overlay.classList.add('active');
            }, 500); // 稍微延迟一点显示结果，让玩家看到炸弹爆炸
        }

        // 启动游戏
        initGame();

    </script>
</body>
</html>
