<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐸蛤蟆集团专用网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* 背景动态光斑 */
        body::before,
        body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            z-index: 0;
        }

        body::before {
            width: 500px;
            height: 500px;
            background: #7f5af0;
            top: -100px;
            left: -100px;
            animation: float1 8s ease-in-out infinite;
        }

        body::after {
            width: 400px;
            height: 400px;
            background: #2cb67d;
            bottom: -80px;
            right: -80px;
            animation: float2 10s ease-in-out infinite;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(80px, 60px); }
        }

        @keyframes float2 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-60px, -80px); }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 50px 40px;
            max-width: 560px;
            width: 90%;
            /* 初始状态模糊，验证通过后清晰 */
            filter: blur(10px);
            transition: filter 0.5s ease;
            pointer-events: none; /* 验证前禁止点击 */
        }

        .container.unlocked {
            filter: blur(0);
            pointer-events: auto;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7f5af0, #2cb67d);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 24px;
            font-size: 42px;
            color: #fff;
            font-weight: bold;
            box-shadow: 0 0 40px rgba(127, 90, 240, 0.4);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 40px rgba(127, 90, 240, 0.4); }
            50% { box-shadow: 0 0 60px rgba(127, 90, 240, 0.7); }
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #fffffe;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 1rem;
            color: #94a1b2;
            margin-bottom: 40px;
        }

        .nav-title {
            font-size: 0.85rem;
            color: #72757e;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
        }

        .card-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            text-decoration: none;
            color: #fffffe;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(127, 90, 240, 0.5);
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(127, 90, 240, 0.2);
        }

        .card-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .card:nth-child(1) .card-icon { background: linear-gradient(135deg, #e53170, #ff6b6b); }
        .card:nth-child(2) .card-icon { background: linear-gradient(135deg, #7f5af0, #a78bfa); }

        .card-info {
            text-align: left;
        }

        .card-info h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .card-info p {
            font-size: 0.85rem;
            color: #94a1b2;
        }

        .card-arrow {
            margin-left: auto;
            font-size: 1.2rem;
            color: #72757e;
            transition: transform 0.3s ease, color 0.3s ease;
        }

        .card:hover .card-arrow {
            transform: translateX(4px);
            color: #7f5af0;
        }

        footer {
            position: fixed;
            bottom: 20px;
            color: #72757e;
            font-size: 0.8rem;
            z-index: 1;
        }

        /* --- 自定义密码弹窗样式 --- */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 12, 41, 0.95); /* 深色背景遮挡 */
            backdrop-filter: blur(15px);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        .auth-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .auth-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            transform: scale(1);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .auth-title {
            color: #fffffe;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .auth-desc {
            color: #94a1b2;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .auth-input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
            text-align: center;
            letter-spacing: 2px;
        }

        .auth-input:focus {
            border-color: #7f5af0;
            box-shadow: 0 0 15px rgba(127, 90, 240, 0.2);
        }

        .auth-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #7f5af0, #2cb67d);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .auth-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .auth-error {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: 15px;
            height: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .auth-error.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- 密码验证弹窗 -->
    <div class="auth-overlay" id="authOverlay">
        <div class="auth-box">
            <div style="font-size: 3rem; margin-bottom: 10px;">🔒</div>
            <h2 class="auth-title">身份验证</h2>
            <p class="auth-desc">请输入蛤蟆集团访问密钥</p>
            
            <div class="input-group">
                <input type="password" id="passwordInput" class="auth-input" placeholder="请输入密码" autocomplete="off">
            </div>
            
            <button class="auth-btn" onclick="checkPassword()">进入网站</button>
            <div class="auth-error" id="errorMsg">密码错误，请重试</div>
        </div>
    </div>

    <script>
        // 页面加载完成后自动聚焦输入框
        window.onload = function() {
            document.getElementById('passwordInput').focus();
        };

        // 监听回车键
        document.getElementById('passwordInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });

        function checkPassword() {
            var input = document.getElementById('passwordInput');
            var errorMsg = document.getElementById('errorMsg');
            var pwd = input.value;

            if (pwd === 'h8m13') {
                // 密码正确
                var overlay = document.getElementById('authOverlay');
                var content = document.getElementById('mainContent');
                
                // 隐藏遮罩层
                overlay.classList.add('hidden');
                // 显示主内容（移除模糊）
                content.classList.add('unlocked');
                
                // 可选：如果您仍然希望跳转到 hama/index.html，请取消下面这行的注释
                window.location.href = 'hama/index.html';
                
            } else if (pwd !== '') {
                // 密码错误且不为空
                errorMsg.classList.add('show');
                input.style.borderColor = '#ff6b6b';
                input.value = ''; // 清空输入框
                
                // 简单的抖动动画效果
                var box = document.querySelector('.auth-box');
                box.style.transform = 'translateX(10px)';
                setTimeout(() => { box.style.transform = 'translateX(-10px)'; }, 100);
                setTimeout(() => { box.style.transform = 'translateX(0)'; }, 200);
                
                setTimeout(() => {
                    errorMsg.classList.remove('show');
                    input.style.borderColor = 'rgba(255, 255, 255, 0.1)';
                }, 2000);
            }
        }
    </script>
</body>
</html>
