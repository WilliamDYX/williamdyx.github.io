<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋游戏</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        .game-container {
            text-align: center;
        }

        canvas {
            background-color: #f3d2b5;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
            cursor: pointer;
        }

        .info {
            margin-top: 20px;
            font-size: 20px;
            text-align: center;
            color: #333;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="chessboard" width="400" height="400"></canvas>
        <div class="info" id="info">黑棋先行</div>
        <button onclick="resetGame()">重新开始</button>
    </div>

    <script>
        const canvas = document.getElementById('chessboard');
        const ctx = canvas.getContext('2d');
        const infoDiv = document.getElementById('info');
        
        // 棋盘参数
        const BOARD_SIZE = 400;
        const GRID_COUNT = 15; // 15x15的棋盘
        const CELL_SIZE = BOARD_SIZE / (GRID_COUNT - 1);
        
        // 游戏状态
        let currentPlayer = 'black'; // black或white
        let gameOver = false;
        let board = []; // 二维数组存储棋盘状态
        
        // 初始化棋盘数据
        function initBoard() {
            board = [];
            for (let i = 0; i < GRID_COUNT; i++) {
                board[i] = [];
                for (let j = 0; j < GRID_COUNT; j++) {
                    board[i][j] = null;
                }
            }
        }
        
        // 绘制棋盘网格
        function drawGrid() {
            ctx.clearRect(0, 0, BOARD_SIZE, BOARD_SIZE);
            
            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 1;
            
            // 绘制横线
            for (let i = 0; i < GRID_COUNT; i++) {
                const y = i * CELL_SIZE;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(BOARD_SIZE, y);
                ctx.stroke();
            }
            
            // 绘制竖线
            for (let i = 0; i < GRID_COUNT; i++) {
                const x = i * CELL_SIZE;
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, BOARD_SIZE);
                ctx.stroke();
            }
        }
        
        // 绘制棋子
        function drawPiece(row, col, color) {
            const x = col * CELL_SIZE;
            const y = row * CELL_SIZE;
            const radius = CELL_SIZE * 0.4;
            
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            
            if (color === 'black') {
                ctx.fillStyle = '#000';
            } else {
                ctx.fillStyle = '#fff';
            }
            
            ctx.fill();
            
            // 添加边框使白色棋子更清晰
            if (color === 'white') {
                ctx.strokeStyle = '#ccc';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }
        
        // 检查是否获胜
        function checkWin(row, col, color) {
            // 四个方向：水平、垂直、主对角线、副对角线
            const directions = [
                [[0, 1], [0, -1]],   // 水平
                [[1, 0], [-1, 0]],   // 垂直
                [[1, 1], [-1, -1]],  // 主对角线
                [[1, -1], [-1, 1]]   // 副对角线
            ];
            
            for (const direction of directions) {
                let count = 1; // 包含当前棋子
                
                // 向两个方向检查
                for (const [dx, dy] of direction) {
                    let r = row + dx;
                    let c = col + dy;
                    
                    while (r >= 0 && r < GRID_COUNT && c >= 0 && c < GRID_COUNT && 
                           board[r][c] === color) {
                        count++;
                        r += dx;
                        c += dy;
                    }
                }
                
                if (count >= 5) {
                    return true;
                }
            }
            
            return false;
        }
        
        // 处理点击事件
        canvas.addEventListener('click', function(event) {
            if (gameOver) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;
            
            // 计算最近的交叉点
            const col = Math.round(x / CELL_SIZE);
            const row = Math.round(y / CELL_SIZE);
            
            // 确保在棋盘范围内且该位置为空
            if (row >= 0 && row < GRID_COUNT && col >= 0 && col < GRID_COUNT && 
                !board[row][col]) {
                
                // 放置棋子
                board[row][col] = currentPlayer;
                drawPiece(row, col, currentPlayer);
                
                // 检查是否获胜
                if (checkWin(row, col, currentPlayer)) {
                    infoDiv.textContent = `${currentPlayer === 'black' ? '黑棋' : '白棋'}获胜！`;
                    gameOver = true;
                    return;
                }
                
                // 切换玩家
                currentPlayer = currentPlayer === 'black' ? 'white' : 'black';
                infoDiv.textContent = `${currentPlayer === 'black' ? '黑棋' : '白棋'}下棋`;
            }
        });
        
        // 重置游戏
        function resetGame() {
            initBoard();
            drawGrid();
            currentPlayer = 'black';
            gameOver = false;
            infoDiv.textContent = '黑棋先行';
        }
        
        // 初始化游戏
        initBoard();
        drawGrid();
    </script>
</body>
</html>
