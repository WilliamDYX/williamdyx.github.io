<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>已关机</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  height: 100vh;
  width: 100vw;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 24px;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  cursor: pointer;
  user-select: none;
}
.power-icon {
  width: 80px;
  height: 80px;
  border: 4px solid #333;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  transition: border-color 0.3s;
}
.power-icon:hover {
  border-color: #555;
}
.power-icon::before {
  content: '';
  width: 4px;
  height: 28px;
  background: #666;
  border-radius: 2px;
  position: absolute;
  top: 16px;
}
.power-icon::after {
  content: '';
  width: 28px;
  height: 28px;
  border: 4px solid #666;
  border-radius: 50%;
  border-top-color: transparent;
  border-right-color: transparent;
  transform: rotate(45deg);
  position: absolute;
  bottom: 18px;
}
.text {
  font-size: 18px;
  color: #666;
  letter-spacing: 2px;
}
.hint {
  position: fixed;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 12px;
  color: #444;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}
</style>
</head>
<body onclick="window.location.href='main.html'">
  <div class="power-icon"></div>
  <div class="text">已关机</div>
  点击屏幕开机
</body>
</html>
