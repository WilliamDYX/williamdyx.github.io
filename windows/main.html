<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windows Web 桌面</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  overflow: hidden; background: #000; height: 100vh; width: 100vw;
}
#desktop {
  position: relative; width: 100%; height: 100vh; overflow: hidden;
}
#wallpaper {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, #1a237e 0%, #283593 25%, #3949ab 50%, #5c6bc0 75%, #7986cb 100%);
  z-index: 0;
}
#icons-area {
  position: absolute; inset: 0; z-index: 1;
  padding: 12px; display: flex; flex-direction: column; flex-wrap: wrap;
  align-content: flex-start; gap: 8px;
  height: calc(100% - 48px);
}
#window-layer {
  position: absolute; inset: 0; z-index: 10; pointer-events: none;
}
.app-window {
  pointer-events: auto; position: absolute;
  background: #1e1e1e; border-radius: 8px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.08);
  display: flex; flex-direction: column;
}
.win-titlebar {
  height: 36px; background: #2d2d2d;
  border-radius: 8px 8px 0 0; display: flex; align-items: center;
  padding: 0 12px; cursor: default; user-select: none;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.win-content { flex: 1; overflow: auto; border-radius: 0 0 8px 8px; }
.win-btn {
  width: 12px; height: 12px; border-radius: 50%; border: none; cursor: pointer;
}
.win-btn.min { background: #fbbf24; }
.win-btn.max { background: #34d399; }
.win-btn.close { background: #f87171; }

#taskbar {
  position: absolute; bottom: 0; left: 0; right: 0; height: 48px;
  background: rgba(32,32,32,0.85); backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255,255,255,0.06);
  z-index: 90; display: flex; align-items: center;
  justify-content: center; gap: 4px; padding: 0 16px;
}
.taskbar-item {
  width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; border-radius: 6px; transition: background 0.15s;
}
.taskbar-item:hover { background: rgba(255,255,255,0.1); }
.taskbar-divider {
  width: 1px; height: 24px; background: rgba(255,255,255,0.1); margin: 0 4px;
}
#clock-area { color: #fff; font-size: 12px; text-align: right; line-height: 1.4; padding: 0 8px; }
#clock-date { font-size: 10px; color: #aaa; }

#start-menu {
  position: absolute; bottom: 52px; left: 50%;
  transform: translateX(-50%) scale(0.95);
  width: 560px; height: 520px;
  background: rgba(32,32,32,0.92); backdrop-filter: blur(20px);
  border-radius: 12px; border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  z-index: 100; opacity: 0; visibility: hidden;
  transition: all 0.15s ease; display: flex; flex-direction: column;
  pointer-events: auto;
}
#start-menu.open { opacity: 1; visibility: visible; transform: translateX(-50%) scale(1); }
.start-header { padding: 16px 20px 8px; }
.start-user {
  display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
}
.start-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 14px; font-weight: 500;
}
.start-pins {
  display: flex; gap: 8px; flex-wrap: wrap;
}
.start-pin {
  width: 72px; height: 72px; background: rgba(255,255,255,0.06);
  border-radius: 8px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 4px;
  cursor: pointer; transition: background 0.15s;
}
.start-pin:hover { background: rgba(255,255,255,0.12); }
.start-apps {
  flex: 1; padding: 0 20px; overflow-y: auto;
}
.start-apps-title {
  color: #888; font-size: 11px; margin-bottom: 8px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.start-app-item {
  padding: 8px 12px; border-radius: 6px; color: #ccc;
  font-size: 13px; cursor: pointer; display: flex;
  align-items: center; gap: 10px; transition: background 0.15s;
}
.start-app-item:hover { background: rgba(255,255,255,0.08); }
.start-footer {
  padding: 12px 20px; border-top: 1px solid rgba(255,255,255,0.06);
  display: flex; justify-content: space-between; align-items: center;
}
.start-footer span { color: #888; font-size: 11px; cursor: pointer; }
.start-footer span:hover { color: #ccc; }

#search-panel {
  position: absolute; top: 60px; left: 50%;
  transform: translateX(-50%) scale(0.95);
  width: 520px; max-height: 480px;
  background: rgba(32,32,32,0.92); backdrop-filter: blur(20px);
  border-radius: 12px; border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  z-index: 100; opacity: 0; visibility: hidden;
  transition: all 0.15s ease; display: flex; flex-direction: column;
  pointer-events: auto;
}
#search-panel.open { opacity: 1; visibility: visible; transform: translateX(-50%) scale(1); }
.search-header { padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.06); }
#search-input {
  width: 100%; background: rgba(255,255,255,0.08); border: none;
  border-radius: 8px; padding: 10px 14px; color: #fff; font-size: 14px; outline: none;
}
.search-body { padding: 16px 20px; }
.search-title { color: #888; font-size: 11px; margin-bottom: 8px; }
.search-item {
  padding: 8px 12px; border-radius: 6px; color: #ccc;
  font-size: 13px; cursor: pointer; display: flex;
  align-items: center; gap: 8px; transition: background 0.15s;
}
.search-item:hover { background: rgba(255,255,255,0.06); }

.desktop-icon {
  width: 72px; display: flex; flex-direction: column;
  align-items: center; gap: 4px; padding: 8px 4px;
  border-radius: 8px; cursor: pointer; transition: background 0.15s;
}
.desktop-icon:hover { background: rgba(255,255,255,0.1); }
.desktop-icon span {
  color: #fff; font-size: 11px; text-align: center;
  text-shadow: 0 1px 3px rgba(0,0,0,0.5); line-height: 1.3;
}

#shutdown-overlay {
  position: fixed; inset: 0; background: #000; z-index: 99999;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 20px; color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
#shutdown-overlay.fade-out {
  opacity: 0;
  transition: opacity 0.5s ease;
}
#shutdown-overlay .spin {
  animation: spin 1s linear infinite;
}
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.hidden { display: none !important; }
</style>
<base target="_blank">
</head>
<body>
<div id="desktop">
  <div id="wallpaper"></div>
  <div id="icons-area"></div>
  <div id="window-layer"></div>

  <div id="start-menu">
    <div class="start-header">
      <div class="start-user">
        <div class="start-avatar">U</div>
        <span style="color:#fff;font-size:14px;font-weight:500;">用户</span>
      </div>
      <div class="start-pins" id="start-pins"></div>
    </div>
    <div class="start-apps">
      <div class="start-apps-title">所有应用</div>
      <div id="start-apps-list"></div>
    </div>
    <div class="start-footer">
      <span>Windows 11 Web</span>
      <div style="display:flex;gap:12px;">
        <span id="btn-shutdown">关机</span>
        <span id="btn-restart">重启</span>
      </div>
    </div>
  </div>

  <div id="search-panel">
    <div class="search-header">
      <input id="search-input" type="text" placeholder="搜索应用、文件和设置" />
    </div>
    <div class="search-body">
      <div class="search-title">热门搜索</div>
      <div id="search-suggestions"></div>
    </div>
  </div>

  <div id="taskbar">
    <div class="taskbar-item" id="btn-start">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="#fff"><path d="M0 3.449L9.75 2.1v9.451H0m10.949-9.602L24 0v11.4H10.949M0 12.6h9.75v9.451L0 20.699M10.949 12.6H24V24l-12.9-1.801"/></svg>
    </div>
    <div class="taskbar-item" id="btn-search">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    </div>
    <div class="taskbar-item" id="btn-taskview">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    </div>
    <div class="taskbar-divider"></div>
    <div id="taskbar-pinned" style="display:flex;gap:2px;"></div>
    <div style="flex:1;"></div>
    <div style="display:flex;align-items:center;gap:8px;padding:0 8px;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M5 12.55a11 11 0 0114.08 0"/><path d="M1.42 9a16 16 0 0121.16 0"/><path d="M8.53 16.11a6 6 0 016.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
      <div id="clock-area">
        <div id="clock-time">12:00</div>
        <div id="clock-date">2026/7/18</div>
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var FS_KEY = 'win_web_fs';
  var SETTINGS_KEY = 'win_web_settings';
  var zIndexCounter = 100;
  var windows = {};
  var activeWindow = null;

  function getFS() {
    try { return JSON.parse(localStorage.getItem(FS_KEY)) || {}; } catch(e) { return {}; }
  }
  function saveFS(fs) { localStorage.setItem(FS_KEY, JSON.stringify(fs)); }
  function getSettings() {
    try { return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {}; } catch(e) { return {}; }
  }

  var fs = getFS();
  if (!fs['桌面']) fs['桌面'] = { type: 'folder', items: {} };
  if (!fs['文档']) fs['文档'] = { type: 'folder', items: {} };
  if (!fs['下载']) fs['下载'] = { type: 'folder', items: {} };
  saveFS(fs);

  var icons = {
    folder: '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="1.5"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>',
    file: '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg>',
    pc: '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#90caf9" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/></svg>',
    recycle: '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>',
    explorer: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#90caf9" stroke-width="1.5"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>',
    notepad: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg>',
    calc: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M8 6h8"/><path d="M8 10h2"/><path d="M8 14h2"/><path d="M8 18h2"/><path d="M14 10h2"/><path d="M14 14h2"/><path d="M14 18h2"/></svg>',
    settings: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>',
    browser: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00bcd4" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 010 20"/><path d="M12 12l5-5"/></svg>',
    terminal: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4caf50" stroke-width="1.5"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M6 8l4 4-4 4"/><path d="M12 16h6"/></svg>'
  };

  var apps = {
    pc: { name: '此电脑', icon: icons.pc },
    recycle: { name: '回收站', icon: icons.recycle },
    explorer: { name: '文件资源管理器', icon: icons.explorer },
    notepad: { name: '记事本', icon: icons.notepad },
    calc: { name: '计算器', icon: icons.calc },
    settings: { name: '设置', icon: icons.settings },
    browser: { name: 'Edge', icon: icons.browser },
    terminal: { name: '终端', icon: icons.terminal }
  };

  // Shutdown / Restart
  function parseShutdownArgs(args) {
    var mode = 's';
    var delay = 0;
    for (var i = 0; i < args.length; i++) {
      if (args[i] === '-s') mode = 's';
      else if (args[i] === '-r') mode = 'r';
      else if (args[i] === '-t' && args[i+1]) {
        delay = parseInt(args[i+1]) || 0;
        i++;
      }
    }
    return { mode: mode, delay: delay };
  }

  function doShutdown(mode, delay) {
    var action = mode === 'r' ? '重启' : '关机';
    var overlay = document.createElement('div');
    overlay.id = 'shutdown-overlay';

    if (delay > 0) {
      overlay.innerHTML = '<div style="font-size:72px;font-weight:300;letter-spacing:2px;">' + delay + '</div><div style="font-size:16px;color:#888;margin-top:12px;">' + action + '倒计时</div>';
      document.body.appendChild(overlay);
      var count = delay;
      var timer = setInterval(function() {
        count--;
        var numEl = overlay.querySelector('div');
        if (numEl) numEl.textContent = count;
        if (count <= 0) {
          clearInterval(timer);
          executeShutdownFinal(mode, overlay);
        }
      }, 1000);
    } else {
      executeShutdownFinal(mode, overlay);
    }
  }

  function executeShutdownFinal(mode, overlay) {
    var isReboot = mode === 'r';
    if (isReboot) {
      overlay.innerHTML = '<div class="spin" style="font-size:48px;">⟳</div><div style="font-size:18px;margin-top:12px;">正在重启...</div>';
      document.body.appendChild(overlay);
      setTimeout(function() {
        overlay.classList.add('fade-out');
        setTimeout(function() {
          overlay.remove();
          Object.keys(windows).forEach(function(id) { closeWindow(id); });
        }, 500);
      }, 2500);
    } else {
      overlay.innerHTML = '<div style="font-size:48px;">⏻</div><div style="font-size:18px;margin-top:12px;">正在关机...</div>';
      document.body.appendChild(overlay);
      window.location.href = 'off.html';
    }
  }

  document.getElementById('btn-shutdown').addEventListener('click', function(e) {
    e.stopPropagation();
    closeStart();
    doShutdown('s', 0);
  });
  document.getElementById('btn-restart').addEventListener('click', function(e) {
    e.stopPropagation();
    closeStart();
    doShutdown('r', 0);
  });

  // Desktop icons
  var desktopApps = ['pc', 'recycle', 'explorer', 'notepad', 'calc', 'settings', 'browser', 'terminal'];
  var iconsArea = document.getElementById('icons-area');
  desktopApps.forEach(function(appId) {
    var app = apps[appId];
    var el = document.createElement('div');
    el.className = 'desktop-icon';
    el.dataset.app = appId;
    el.innerHTML = app.icon + '<span>' + app.name + '</span>';
    el.addEventListener('dblclick', function() { openApp(appId); });
    iconsArea.appendChild(el);
  });

  // Start menu
  var startPins = document.getElementById('start-pins');
  var startAppsList = document.getElementById('start-apps-list');
  var pinnedApps = ['explorer', 'notepad', 'calc', 'settings'];
  pinnedApps.forEach(function(appId) {
    var app = apps[appId];
    var el = document.createElement('div');
    el.className = 'start-pin';
    el.dataset.app = appId;
    el.innerHTML = app.icon + '<span style="color:#ccc;font-size:10px;">' + app.name + '</span>';
    el.addEventListener('click', function() { openApp(appId); });
    startPins.appendChild(el);
  });
  Object.keys(apps).forEach(function(appId) {
    var app = apps[appId];
    var el = document.createElement('div');
    el.className = 'start-app-item';
    el.dataset.app = appId;
    el.innerHTML = app.icon + '<span>' + app.name + '</span>';
    el.addEventListener('click', function() { openApp(appId); });
    startAppsList.appendChild(el);
  });

  // Taskbar
  var taskbarPinned = document.getElementById('taskbar-pinned');
  var taskbarApps = ['explorer', 'notepad', 'calc', 'settings', 'browser'];
  taskbarApps.forEach(function(appId) {
    var app = apps[appId];
    var el = document.createElement('div');
    el.className = 'taskbar-item';
    el.dataset.app = appId;
    el.innerHTML = app.icon;
    el.addEventListener('click', function() { openApp(appId); });
    taskbarPinned.appendChild(el);
  });

  // Search
  var searchSuggestions = document.getElementById('search-suggestions');
  var searchItems = ['记事本', '计算器', '设置'];
  searchItems.forEach(function(name) {
    var el = document.createElement('div');
    el.className = 'search-item';
    el.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>' + name;
    el.addEventListener('click', function() {
      if (name === '记事本') openApp('notepad');
      else if (name === '计算器') openApp('calc');
      else if (name === '设置') openApp('settings');
      closeSearch();
    });
    searchSuggestions.appendChild(el);
  });

  // Clock
  function updateClock() {
    var now = new Date();
    document.getElementById('clock-time').textContent = now.toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
    document.getElementById('clock-date').textContent = now.toLocaleDateString('zh-CN');
  }
  updateClock();
  setInterval(updateClock, 1000);

  // Start menu / Search toggle
  var startMenu = document.getElementById('start-menu');
  var searchPanel = document.getElementById('search-panel');

  function closeStart() { startMenu.classList.remove('open'); }
  function closeSearch() { searchPanel.classList.remove('open'); }

  document.getElementById('btn-start').addEventListener('click', function() {
    startMenu.classList.toggle('open');
    searchPanel.classList.remove('open');
  });
  document.getElementById('btn-search').addEventListener('click', function() {
    searchPanel.classList.toggle('open');
    startMenu.classList.remove('open');
    if (searchPanel.classList.contains('open')) {
      setTimeout(function() { document.getElementById('search-input').focus(); }, 100);
    }
  });

  document.getElementById('wallpaper').addEventListener('click', function() {
    closeStart(); closeSearch();
  });

  // Window management
  function createWindow(appId, title, contentHTML, width, height) {
    var id = 'win-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5);
    zIndexCounter++;
    var win = document.createElement('div');
    win.id = id;
    win.className = 'app-window';
    win.dataset.app = appId;
    win.style.cssText = 'width:' + width + 'px;height:' + height + 'px;left:80px;top:40px;z-index:' + zIndexCounter + ';';
    win.innerHTML =
      '<div class="win-titlebar">' +
        '<div style="flex:1;display:flex;align-items:center;gap:8px;">' +
          '<span style="color:#ccc;font-size:12px;">' + title + '</span>' +
        '</div>' +
        '<div style="display:flex;gap:8px;">' +
          '<button class="win-btn min"></button>' +
          '<button class="win-btn max"></button>' +
          '<button class="win-btn close"></button>' +
        '</div>' +
      '</div>' +
      '<div class="win-content">' + contentHTML + '</div>';
    document.getElementById('window-layer').appendChild(win);
    windows[id] = { element: win, minimized: false, maximized: false, prevRect: null };
    activeWindow = id;

    var titlebar = win.querySelector('.win-titlebar');
    var closeBtn = win.querySelector('.win-btn.close');
    var minBtn = win.querySelector('.win-btn.min');
    var maxBtn = win.querySelector('.win-btn.max');

    closeBtn.addEventListener('click', function() { closeWindow(id); });
    minBtn.addEventListener('click', function() { minimizeWindow(id); });
    maxBtn.addEventListener('click', function() { maximizeWindow(id); });
    win.addEventListener('mousedown', function() { focusWindow(id); });

    var dragging = false, dragOffsetX, dragOffsetY;
    titlebar.addEventListener('mousedown', function(e) {
      if (e.target.tagName === 'BUTTON') return;
      dragging = true;
      dragOffsetX = e.clientX - win.offsetLeft;
      dragOffsetY = e.clientY - win.offsetTop;
      win.style.transition = 'none';
    });
    document.addEventListener('mousemove', function(e) {
      if (!dragging) return;
      win.style.left = (e.clientX - dragOffsetX) + 'px';
      win.style.top = (e.clientY - dragOffsetY) + 'px';
    });
    document.addEventListener('mouseup', function() { dragging = false; win.style.transition = ''; });

    return id;
  }

  function closeWindow(id) {
    if (windows[id]) { windows[id].element.remove(); delete windows[id]; }
  }
  function minimizeWindow(id) {
    var w = windows[id]; if (!w) return;
    w.minimized = !w.minimized;
    w.element.style.display = w.minimized ? 'none' : 'flex';
  }
  function maximizeWindow(id) {
    var w = windows[id]; if (!w) return;
    if (w.maximized) {
      w.maximized = false;
      w.element.style.width = w.prevRect.width;
      w.element.style.height = w.prevRect.height;
      w.element.style.left = w.prevRect.left;
      w.element.style.top = w.prevRect.top;
    } else {
      w.maximized = true;
      w.prevRect = { width: w.element.style.width, height: w.element.style.height, left: w.element.style.left, top: w.element.style.top };
      w.element.style.width = '100%';
      w.element.style.height = 'calc(100% - 48px)';
      w.element.style.left = '0';
      w.element.style.top = '0';
    }
  }
  function focusWindow(id) {
    if (!windows[id]) return;
    zIndexCounter++;
    windows[id].element.style.zIndex = zIndexCounter;
    activeWindow = id;
  }

  // Calculator
  function openCalculator() {
    var btns = ['C','±','%','÷','7','8','9','×','4','5','6','-','1','2','3','+','0','.','='];
    var html =
      '<div style="padding:12px;display:flex;flex-direction:column;gap:8px;height:100%;box-sizing:border-box;">' +
        '<div id="calc-display" style="background:#0d0d0d;border-radius:6px;padding:12px 16px;text-align:right;color:#fff;font-size:28px;font-weight:500;min-height:48px;display:flex;align-items:center;justify-content:flex-end;overflow:hidden;">0</div>' +
        '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;flex:1;">' +
          btns.map(function(btn) {
            var isOp = ['÷','×','-','+','='].indexOf(btn) !== -1;
            var isFn = ['C','±','%'].indexOf(btn) !== -1;
            var span = btn === '0' ? 'grid-column:span 2;' : '';
            var bg = isOp ? '#1976d2' : isFn ? '#424242' : '#2d2d2d';
            return '<button class="calc-btn" data-val="' + btn + '" style="' + span + 'background:' + bg + ';color:#fff;border:none;border-radius:6px;font-size:16px;cursor:pointer;transition:opacity 0.1s;">' + btn + '</button>';
          }).join('') +
        '</div>' +
      '</div>';
    var winId = createWindow('calc', '计算器', html, 280, 380);
    setTimeout(function() {
      var winEl = document.getElementById(winId);
      if (!winEl) return;
      var display = '0', prev = null, op = null, resetNext = false;
      var displayEl = winEl.querySelector('#calc-display');
      winEl.querySelectorAll('.calc-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var val = btn.dataset.val;
          if (val === 'C') { display = '0'; prev = null; op = null; }
          else if (val === '±') { display = String(-parseFloat(display)); }
          else if (val === '%') { display = String(parseFloat(display) / 100); }
          else if (['÷','×','-','+'].indexOf(val) !== -1) { prev = parseFloat(display); op = val; resetNext = true; }
          else if (val === '=') {
            if (prev !== null && op) {
              var cur = parseFloat(display);
              if (op === '÷') display = String(prev / cur);
              if (op === '×') display = String(prev * cur);
              if (op === '-') display = String(prev - cur);
              if (op === '+') display = String(prev + cur);
              prev = null; op = null;
            }
          } else {
            if (resetNext || display === '0') { display = val; resetNext = false; }
            else { display += val; }
          }
          displayEl.textContent = display;
        });
      });
    }, 10);
  }

          var folder = fs[cwd] || { items: {} };
          if (!folder.items[name]) return '<span style="color:#f44336;"> 找不到: ' + name + '</span>';
          delete folder.items[name];
          saveFS(fs);
          return '<span style="color:#4caf50;"> ✓ 已删除: ' + name + '</span>';
        },

        mv: function(args) {
          if (args.length < 2) return '<span style="color:#f44336;">用法: mv 源文件 目标文件</span>';
          var src = args[0], dst = args[1];
          var fs = getFS();
          var folder = fs[cwd] || { items: {} };
          if (!folder.items[src]) return '<span style="color:#f44336;"> 找不到: ' + src + '</span>';
          folder.items[dst] = folder.items[src];
          delete folder.items[src];
          saveFS(fs);
          return '<span style="color:#4caf50;"> ✓ 已重命名: ' + src + ' → ' + dst + '</span>';
        },

        cp: function(args) {
          if (args.length < 2) return '<span style="color:#f44336;">用法: cp 源文件 目标文件</span>';
          var src = args[0], dst = args[1];
          var fs = getFS();
          var folder = fs[cwd] || { items: {} };
          if (!folder.items[src]) return '<span style="color:#f44336;"> 找不到: ' + src + '</span>';
          folder.items[dst] = JSON.parse(JSON.stringify(folder.items[src]));
          saveFS(fs);
          return '<span style="color:#4caf50;"> ✓ 已复制: ' + src + ' → ' + dst + '</span>';
        },

        echo: function(args) { return '<span style="color:#ccc;"> ' + args.join(' ') + '</span>'; },

        date: function() { return '<span style="color:#ccc;"> ' + new Date().toLocaleString('zh-CN') + '</span>'; },

        whoami: function() { return '<span style="color:#ccc;"> desktop-user</span>'; },

        shutdown: function(args) {
          var parsed = parseShutdownArgs(args);
          var mode = parsed.mode;
          var delay = parsed.delay;
          var action = mode === 'r' ? '重启' : '关机';
          if (delay > 0) {
            log('<span style="color:#fbbf24;">⚠ ' + action + '将在 ' + delay + ' 秒后开始...</span>');
            var count = delay;
            var timer = setInterval(function() {
              count--;
              if (count > 0) {
                log('<span style="color:#888;">... ' + count + ' 秒</span>');
              } else {
                clearInterval(timer);
                doShutdown(mode, 0);
              }
            }, 1000);
            return '';
          } else {
            doShutdown(mode, 0);
            return '<span style="color:#f44336;">⚠ 正在' + action + '...</span>';
          }
        }
      };

      input.addEventListener('keydown', function(e) {
        if (e.key !== 'Enter') return;
        var cmdLine = input.value.trim();
        if (!cmdLine) return;

        log('<span style="color:#4caf50;">PS C:\\Users\\User\\' + cwd + '&gt;</span> <span style="color:#ccc;">' + cmdLine.replace(/</g, '&lt;') + '</span>');

        var parts = cmdLine.split(/\s+/);
        var cmd = parts[0].toLowerCase();
        var args = parts.slice(1);

        var handler = commands[cmd];
        if (handler) {
          var result = handler(args);
          if (result) log(result);
        } else {
          log('<span style="color:#f44336;">' + cmd + ' : 无法识别命令。输入 help 查看可用命令。</span>');
        }

        input.value = '';
      });

      input.focus();
    }, 10);
  }
});
</script>
</body>
</html>
