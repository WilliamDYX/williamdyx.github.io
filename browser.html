<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>极简起始页</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f11;
      --card: #1a1a1e;
      --card-hover: #25252b;
      --text: #e8e8ec;
      --text-muted: #8b8b96;
      --accent: #4a9eff;
      --accent-soft: rgba(74, 158, 255, 0.15);
      --border: rgba(255,255,255,0.06);
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .bg-glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(74,158,255,0.08) 0%, transparent 70%);
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 0;
    }
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
    }
    .clock { text-align: center; margin-bottom: -16px; }
    .clock-time {
      font-size: 72px;
      font-weight: 300;
      letter-spacing: -2px;
      background: linear-gradient(180deg, #fff 0%, #a0a0b0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .clock-date {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 8px;
      letter-spacing: 1px;
    }
    .search-box { width: 100%; position: relative; }
    .search-input {
      width: 100%;
      padding: 18px 28px 18px 56px;
      font-size: 16px;
      color: var(--text);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      outline: none;
      transition: all 0.3s ease;
      font-family: inherit;
      box-shadow: var(--shadow);
    }
    .search-input::placeholder { color: var(--text-muted); font-weight: 300; }
    .search-input:focus {
      border-color: rgba(74,158,255,0.3);
      background: var(--card-hover);
      box-shadow: 0 8px 32px rgba(74,158,255,0.08), var(--shadow);
    }
    .search-icon {
      position: absolute;
      left: 22px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      transition: color 0.3s;
    }
    .search-box:focus-within .search-icon { color: var(--accent); }
    .nav-section { width: 100%; }
    .nav-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 16px;
      padding-left: 4px;
    }
    .nav-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 12px;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 20px 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      text-decoration: none;
      color: var(--text-muted);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .nav-item:hover {
      background: var(--card-hover);
      border-color: rgba(74,158,255,0.2);
      color: var(--text);
      transform: translateY(-3px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.3);
    }
    .nav-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      background: var(--accent-soft);
      transition: all 0.25s ease;
    }
    .nav-item:hover .nav-icon {
      background: rgba(74,158,255,0.25);
      transform: scale(1.1);
    }
    .nav-name { font-size: 13px; font-weight: 400; }
    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: var(--text-muted);
      opacity: 0.5;
    }
    @media (max-width: 480px) {
      .clock-time { font-size: 52px; }
      .nav-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="container">
    <div class="clock">
      <div class="clock-time" id="clockTime">00:00</div>
      <div class="clock-date" id="clockDate">Loading...</div>
    </div>
    <div class="search-box">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" class="search-input" id="searchInput" placeholder="输入关键词，回车搜索..." autocomplete="off" autofocus>
    </div>
    <div class="nav-section">
      <div class="nav-label">快速导航</div>
      <div class="nav-grid" id="navGrid"></div>
    </div>
    <div class="footer">极简 · 无广告 · 纯净</div>
  </div>

  <script>
    // 时钟
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2,'0');
      const m = String(now.getMinutes()).padStart(2,'0');
      document.getElementById('clockTime').textContent = `${h}:${m}`;
      const w = ['周日','周一','周二','周三','周四','周五','周六'];
      document.getElementById('clockDate').textContent =
        `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${w[now.getDay()]}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // 搜索
    document.getElementById('searchInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        const q = this.value.trim();
        if (q) { window.open(`https://cn.bing.com/search?q=${encodeURIComponent(q)}`, '_blank'); this.value = ''; }
      }
    });

      { name:'MDN',       url:'https://developer.mozilla.org/zh-CN/', icon:'<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M1.714 0h20.572C23.233 0 24 .768 24 1.714v20.572c0 .947-.768 1.714-1.714 1.714H1.714A1.714 1.714 0 0 1 0 22.286V1.714C0 .768.768 0 1.714 0zm16.457 6.857h-3.086l-2.063 7.714-2.057-7.714H7.886L5.829 18.286h2.743l1.371-7.714 2.057 7.714h2.743l2.057-7.714 1.371 7.714h2.743L18.171 6.857z"/></svg>' },

      { name:'Google',    url:'https://www.google.com', icon:'<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12.48 10.92v3.28h7.84c-.24 1.84-.853 3.187-1.787 4.133-1.147 1.147-2.933 2.4-6.053 2.4-4.827 0-8.6-3.893-8.6-8.72s3.773-8.72 8.6-8.72c2.6 0 4.507 1.027 5.907 2.347l2.307-2.307C18.747 1.44 16.133 0 12.48 0 5.867 0 .307 5.387.307 12s5.56 12 12.173 12c3.573 0 6.267-1.173 8.373-3.36 2.16-2.16 2.84-5.213 2.84-7.667 0-.76-.053-1.467-.173-2.053H12.48z"/></svg>' },
    ];

    const grid = document.getElementById('navGrid');
    navItems.forEach(item => {
      const a = document.createElement('a');
      a.className = 'nav-item';
      a.href = item.url;
      a.target = '_blank';
      a.innerHTML = `<div class="nav-icon">${item.icon}</div><span class="nav-name">${item.name}</span>`;
      grid.appendChild(a);
    });
  </script>
</body>
</html>
